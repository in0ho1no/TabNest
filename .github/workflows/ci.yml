name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore TabNest.slnx

      - name: Build
        run: dotnet build TabNest.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test TabNest.slnx --no-build --configuration Release --verbosity normal
